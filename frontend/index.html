<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>402 虚拟生活社区系统</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <div id="app">
        <!-- 音乐播放器 -->
        <div class="player" id="player">
            <div class="player-info">
                <div class="player-track">
                    <span id="player-title">402</span>
                    <span id="player-artist">402 小队</span>
                </div>
                <div class="player-time">
                    <span id="player-current-time">0:00</span>
                    <span>/</span>
                    <span id="player-total-time">0:00</span>
                </div>
            </div>
            
            <div class="player-controls">
                <button class="player-btn" id="player-prev-btn" title="上一首">⏮</button>
                <button class="player-btn player-btn-primary" id="player-play-btn" title="播放/暂停">▶ 播放</button>
                <button class="player-btn" id="player-next-btn" title="下一首">⏭</button>
                <button class="player-btn" id="player-loop-btn" title="循环模式">🔁 循环开</button>
            </div>
            
            <div class="player-progress-container" id="player-progress-bar">
                <div class="player-progress" id="player-progress"></div>
            </div>
            
            <div class="player-error" id="player-error" style="display: none;"></div>
        </div>
        
        <!-- 主内容区域 -->
        <main class="main-content">
            <h1>402 虚拟生活社区系统</h1>
            <p>欢迎来到我们的数字家园</p>
        </main>
    </div>
    
    <script src="./scripts/player.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>402 虚拟生活社区系统 - 八方旅人风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(139, 69, 19, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FFF8DC;
            font-size: 24px;
            text-align: center;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">⏳ 正在加载 402 虚拟生活社区系统...</div>
        <div id="error-message" style="display: none; color: #ff6b6b; text-align: center; padding: 20px; font-family: Georgia, serif;">
            <h2>⚠️ 加载失败</h2>
            <p>请检查网络连接或刷新页面</p>
            <button onclick="location.reload()" style="padding: 10px 20px; font-size: 16px;">🔄 重新加载</button>
        </div>
    </div>
    
    <!-- 加载超时检测 -->
    <script>
        // 10秒后显示错误信息
        setTimeout(() => {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error-message');
            if (loading && loading.style.display !== 'none') {
                loading.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        }, 10000);
    </script>
    
    <!-- 使用多个 CDN 源，提高加载成功率 -->
    <script src="https://unpkg.com/phaser@3.90.0/dist/phaser.min.js"></script>
    <script>
        // 如果 unpkg 加载失败，回退到 cdnjs
    </script>
    <script>
        window.Phaser || document.write('<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"><\/script>');
    </script>
    
    <script>
        // Boot 场景
        class Boot extends Phaser.Scene {
            constructor() {
                super({ key: 'Boot' });
            }

            preload() {
                console.log('🔄 开始加载资源...');

                // 创建加载进度条
                const progressBar = this.add.graphics();
                const width = this.cameras.main.width;
                const height = this.cameras.main.height;
                
                const progressBarBg = this.add.graphics();
                progressBarBg.fillStyle(0x8B4513, 1);
                progressBarBg.fillRect(width/4, height/2 - 15, width/2, 30);
                
                this.load.on('progress', (value) => {
                    progressBar.clear();
                    progressBar.fillStyle(0xFFD700, 1);
                    progressBar.fillRect(width/4, height/2 - 15, (width/2) * value, 30);
                });
                
                this.load.on('complete', () => {
                    progressBar.destroy();
                    progressBarBg.destroy();
                    console.log('✅ 资源加载完成');
                });

                // 加载八方旅人风格角色
                const members = ['chu', 'bo', 'hao', 'zhu', 'dong', 'qian'];
                const charFiles = {
                    'chu': 'assets/skins/characters/初.png',
                    'bo': 'assets/skins/characters/博.png',
                    'hao': 'assets/skins/characters/昊.png',
                    'zhu': 'assets/skins/characters/竹.png',
                    'dong': 'assets/skins/characters/东.png',
                    'qian': 'assets/skins/characters/千.png'
                };
                
                members.forEach(member => {
                    this.load.image(member, charFiles[member]);
                    this.load.spritesheet(member, charFiles[member], {
                        frameWidth: 256,  // HD-2D: 256x256
                        frameHeight: 256
                    });
                    console.log(`✅ 加载 HD-2D 角色: ${member} (${charFiles[member]})`);
                });
            }

            create() {
                console.log('🎮 创建动画...');
                this.createCharacterAnimations();
                console.log('✅ 八方旅人风格系统初始化完成');
                this.time.delayedCall(1000, () => {
                    console.log('🏠 启动主场景...');
                    this.scene.start('Home');
                });
            }

            createCharacterAnimations() {
                const members = ['chu', 'bo', 'hao', 'zhu', 'dong', 'qian'];
                
                members.forEach(member => {
                    this.anims.create({
                        key: `${member}_idle`,
                        frames: [{ key: member, frame: 0 }],
                        frameRate: 1,
                        repeat: -1
                    });
                });
                
                console.log('✅ 角色动画创建完成');
            }
        }

        // Character 类
        class Character extends Phaser.Physics.Arcade.Sprite {
            constructor(scene, x, y, memberData) {
                super(scene, x, y, memberData.id);
                
                this.memberData = memberData;
                this.characterId = memberData.id;
                this.characterName = memberData.name;
                this.currentState = 'idle';
                
                scene.physics.add.existing(this);
                this.setCollideWorldBounds(true);
                this.setInteractive();
                
                this.on('pointerdown', this.handleClick, this);
                this.on('pointerover', this.handleHover, this);
                this.on('pointerout', this.handleHoverOut, this);
                
                scene.add.existing(this);
                this.play(`${this.characterId}_idle`);
                this.createNameLabel();
            }

            createNameLabel() {
                this.nameLabel = this.scene.add.text(this.x, this.y - 50, this.characterName, {
                    fontSize: '18px',
                    fill: '#3E2723',
                    backgroundColor: 'rgba(255,248,220, 0.8)',
                    padding: { x: 8, y: 4 },
                    fontFamily: 'Georgia, serif',
                    fontStyle: 'bold'
                });
                this.nameLabel.setOrigin(0.5);
            }

            handleClick() {
                console.log(`👆 点击角色: ${this.characterName}`);
                this.showInteractionMenu();
            }

            handleHover() {
                this.scene.tweens.add({
                    targets: this,
                    scaleX: 1.1,
                    scaleY: 1.1,
                    duration: 150,
                    ease: 'Sine.easeInOut'
                });
            }

            handleHoverOut() {
                this.scene.tweens.add({
                    targets: this,
                    scaleX: 1,
                    scaleY: 1,
                    duration: 150,
                    ease: 'Sine.easeInOut'
                });
            }

            showInteractionMenu() {
                const scene = this.scene;
                
                // 关闭之前的菜单
                if (this.currentMenu) {
                    this.currentMenu.destroy();
                }
                
                const menu = scene.add.container(this.x, this.y - 120);
                this.currentMenu = menu;
                
                // 背景（八方旅人风格边框）
                const bg = scene.add.rectangle(0, 0, 220, 220, 0xFFF8DC);
                bg.setStrokeStyle(4, 0x8B4513);
                menu.add(bg);
                
                // 内边框
                const innerBg = scene.add.rectangle(0, 0, 200, 200, 0xFFFAF0);
                menu.add(innerBg);
                
                // 标题
                const title = scene.add.text(0, -90, this.characterName, {
                    fontSize: '20px',
                    fill: '#5D4037',
                    fontStyle: 'bold',
                    fontFamily: 'Georgia, serif',
                    stroke: '#3E2723',
                    strokeThickness: 2
                });
                title.setOrigin(0.5);
                menu.add(title);
                
                // 按钮分组
                const buttons = [
                    { 
                        text: '⚔ 动作', 
                        action: () => this.showActionMenu(),
                        color: '#8B4513',
                        y: -40
                    },
                    { 
                        text: '📜 信息', 
                        action: () => this.showInfo(),
                        color: '#6B8E23',
                        y: 10
                    },
                    { 
                        text: '❌ 关闭', 
                        action: () => menu.destroy(),
                        color: '#C0392B',
                        y: 60
                    }
                ];
                
                buttons.forEach(btn => {
                    const button = scene.add.rectangle(0, btn.y, 160, 40, btn.color);
                    button.setStrokeStyle(2, 0x3E2723);
                    button.setInteractive();
                    menu.add(button);
                    
                    const buttonText = scene.add.text(0, btn.y, btn.text, {
                        fontSize: '18px',
                        fill: '#FFF8DC',
                        fontFamily: 'Georgia, serif',
                        fontStyle: 'bold'
                    });
                    buttonText.setOrigin(0.5);
                    menu.add(buttonText);
                    
                    button.on('pointerdown', btn.action);
                    button.on('pointerover', () => {
                        scene.tweens.add({
                            targets: button,
                            scaleX: 1.05,
                            scaleY: 1.05,
                            duration: 100
                        });
                    });
                    button.on('pointerout', () => {
                        button.setScale(1);
                    });
                });
                
                scene.time.delayedCall(10000, () => {
                    menu.destroy();
                    this.currentMenu = null;
                });
            }

            showActionMenu() {
                const scene = this.scene;
                
                if (this.currentMenu) {
                    this.currentMenu.destroy();
                }
                
                const actionMenu = scene.add.container(this.x, this.y - 100);
                this.currentMenu = actionMenu;
                
                const bg = scene.add.rectangle(0, 0, 240, 300, 0xFFF8DC);
                bg.setStrokeStyle(4, 0x8B4513);
                actionMenu.add(bg);
                
                const title = scene.add.text(0, -130, '选择动作', {
                    fontSize: '20px',
                    fill: '#5D4037',
                    fontStyle: 'bold',
                    fontFamily: 'Georgia, serif'
                });
                title.setOrigin(0.5);
                actionMenu.add(title);
                
                const actions = [
                    { text: '🍹 调酒', emoji: '🍹', action: () => this.makeDrink(), color: '#E67E22' },
                    { text: '🍺 灌醉', emoji: '🍺', action: () => this.getDrunk(), color: '#E74C3C' },
                    { text: '😴 休息', emoji: '😴', action: () => this.rest(), color: '#9B59B6' },
                    { text: '🎨 换装', emoji: '🎨', action: () => this.changeSkin(), color: '#3498DB' },
                    { text: '🎵 唱歌', emoji: '🎵', action: () => this.sing(), color: '#F1C40F' },
                    { text: '💃 跳舞', emoji: '💃', action: () => this.dance(), color: '#E91E63' },
                    { text: '📝 备忘', emoji: '📝', action: () => this.setMemo(), color: '#607D8B' },
                    { text: '❌ 返回', emoji: '❌', action: () => {
                        actionMenu.destroy();
                        this.showInteractionMenu();
                    }, color: '#95E5D5' }
                ];
                
                actions.forEach((action, index) => {
                    const x = -90 + (index % 2) * 90;
                    const y = -90 + Math.floor(index / 2) * 50;
                    
                    const button = scene.add.rectangle(x, y, 80, 40, action.color);
                    button.setStrokeStyle(2, 0x3E2723);
                    button.setInteractive();
                    actionMenu.add(button);
                    
                    const buttonText = scene.add.text(x, y, `${action.emoji}\n${action.text}`, {
                        fontSize: '12px',
                        fill: '#FFF8DC',
                        fontFamily: 'Georgia, serif',
                        align: 'center',
                        lineSpacing: 2
                    });
                    buttonText.setOrigin(0.5);
                    actionMenu.add(buttonText);
                    
                    button.on('pointerdown', action.action);
                    button.on('pointerover', () => {
                        scene.tweens.add({
                            targets: button,
                            scaleX: 1.05,
                            scaleY: 1.05,
                            duration: 100
                        });
                    });
                    button.on('pointerout', () => {
                        button.setScale(1);
                    });
                });
                
                scene.time.delayedCall(12000, () => {
                    actionMenu.destroy();
                    this.currentMenu = null;
                });
            }

            makeDrink() {
                console.log(`🍹 ${this.characterName} 正在调酒`);
                this.showEffect('🍹 调酒中...');
                this.scene.tweens.add({
                    targets: this,
                    scale: 1.2,
                    duration: 150,
                    yoyo: true,
                    repeat: 2
                });
                this.scene.time.delayedCall(3000, () => {
                    this.showEffect('✅ 调酒完成！');
                });
            }

            getDrunk() {
                console.log(`🥴 ${this.characterName} 被灌醉了`);
                this.showEffect('🥴 醉酒了！');
                this.currentState = 'drunk';
                this.scene.tweens.add({
                    targets: this,
                    angle: 15,
                    duration: 2000,
                    yoyo: true,
                    repeat: 3
                });
                this.scene.time.delayedCall(10000, () => {
                    this.showEffect('😊 恢复清醒');
                });
            }

            rest() {
                console.log(`😴 ${this.characterName} 正在休息`);
                this.showEffect('😴 休息中...');
                this.scene.tweens.add({
                    targets: this,
                    alpha: 0.5,
                    duration: 2000,
                    yoyo: true,
                    repeat: 1
                });
            }

            changeSkin() {
                console.log(`🎨 ${this.characterName} 更换皮肤`);
                this.showEffect('🎨 皮肤功能开发中...');
            }

            sing() {
                console.log(`🎵 ${this.characterName} 正在唱歌`);
                this.showEffect('🎵 ~啦啦啦~');
                this.scene.tweens.add({
                    targets: this,
                    scale: 1.3,
                    duration: 300,
                    yoyo: true,
                    repeat: 2
                });
            }

            dance() {
                console.log(`💃 ${this.characterName} 正在跳舞`);
                this.showEffect('💃 跳舞中...');
                this.scene.tweens.add({
                    targets: this,
                    angle: 360,
                    duration: 1000,
                    repeat: 2
                });
            }

            setMemo() {
                console.log(`📝 ${this.characterName} 设置备忘`);
                this.showEffect('📝 备忘功能开发中...');
            }

            showInfo() {
                const scene = this.scene;
                const infoText = `👤 名称: ${this.characterName}\n🎭 ID: ${this.characterId}\n❤️ 状态: ${this.currentState}`;
                
                const info = scene.add.text(this.x, this.y - 180, infoText, {
                    fontSize: '14px',
                    fill: '#3E2723',
                    backgroundColor: '#FFF8DC',
                    padding: { x: 12, y: 8 },
                    lineSpacing: 4,
                    fontFamily: 'Georgia, serif',
                    stroke: '#8B4513',
                    strokeThickness: 2
                });
                info.setOrigin(0.5);
                scene.time.delayedCall(5000, () => info.destroy());
            }

            showEffect(text) {
                const scene = this.scene;
                const effectText = scene.add.text(this.x, this.y - 70, text, {
                    fontSize: '16px',
                    fill: '#5D4037',
                    backgroundColor: 'rgba(255,248,220, 0.9)',
                    padding: { x: 10, y: 6 },
                    fontFamily: 'Georgia, serif',
                    stroke: '#8B4513',
                    strokeThickness: 2
                });
                effectText.setOrigin(0.5);
                
                scene.tweens.add({
                    targets: effectText,
                    y: this.y - 100,
                    alpha: 0,
                    duration: 2500,
                    onComplete: () => effectText.destroy()
                });
            }

            destroy() {
                if (this.nameLabel) {
                    this.nameLabel.destroy();
                }
                super.destroy();
            }
        }

        // Home 场景
        class Home extends Phaser.Scene {
            constructor() {
                super({ key: 'Home' });
            }

            create() {
                console.log('🏠 八方旅人风格主场景加载');
                
                // 八方旅人米黄色背景
                this.add.rectangle(512, 384, 1024, 768, 0xFFF8DC);
                
                // 木质地板
                const floor = this.add.rectangle(512, 650, 900, 200, 0xDEB887);
                floor.setStrokeStyle(4, 0x8B4513);
                
                // 标题
                this.add.text(512, 50, '402 虚拟生活社区', {
                    fontSize: '42px',
                    fill: '#5D4037',
                    fontStyle: 'bold',
                    fontFamily: 'Georgia, serif',
                    stroke: '#3E2723',
                    strokeThickness: 3
                }).setOrigin(0.5);
                
                // 副标题
                this.add.text(512, 90, '八方旅人风格', {
                    fontSize: '20px',
                    fill: '#8B4513',
                    fontStyle: 'italic',
                    fontFamily: 'Georgia, serif'
                }).set-origin(0.5);
                
                this.characters = this.physics.add.group();
                this.loadCharacters();
                this.createUI();
                this.showWelcomeMessage();
                
                console.log('✅ 主场景初始化完成');
            }

            async loadCharacters() {
                try {
                    const response = await fetch('/api/members');
                    const members = await response.json();
                    
                    console.log('📋 加载成员:', members);
                    
                    members.forEach((member, index) => {
                        // HD-2D 风格：更大的角色，更分散的布局
                        const x = 200 + (index % 3) * 300;
                        const y = 300 + Math.floor(index / 3) * 200;
                        
                        const char = new Character(this, x, y, member);
                        char.setScale(2.0);  // HD-2D：放大到 128x128
                        this.characters.add(char);
                    });
                    
                    console.log(`✅ 创建了 ${members.length} 个 HD-2D 角色`);
                } catch (error) {
                    console.error('❌ 加载成员失败:', error);
                    this.showError('无法加载成员数据');
                }
            }

            createUI() {
                const buttons = [
                    { text: '🎵 音乐', y: 50, action: () => this.showNotification('音乐播放器（开发中）') },
                    { text: '💬 聊天', y: 100, action: () => this.showNotification('聊天室（开发中）') },
                    { text: '🌳 树洞', y: 150, action: () => this.showNotification('树洞（开发中）') }
                ];
                
                buttons.forEach(btn => {
                    const button = this.add.rectangle(900, btn.y, 100, 40, btn.y === 50 ? '#4CAF50' : btn.y === 100 ? '#2196F3' : '#FF9800');
                    button.setStrokeStyle(2, 0x8B4513);
                    button.setInteractive();
                    
                    const buttonText = this.add.text(900, btn.y, btn.text, {
                        fontSize: '16px',
                        fill: '#FFF8DC',
                        fontFamily: 'Georgia, serif',
                        fontStyle: 'bold'
                    });
                    buttonText.setOrigin(0.5);
                    
                    button.on('pointerdown', btn.action);
                    button.on('pointerover', () => {
                        this.tweens.add({
                            targets: button,
                            scaleX: 1.05,
                            duration: 100
                        });
                    });
                    button.on('pointerout', () => {
                        button.setScale(1);
                    });
                });
                
                console.log('✅ UI 创建完成');
            }

            showNotification(message) {
                const notification = this.add.text(512, 700, message, {
                    fontSize: '18px',
                    fill: '#5D4037',
                    backgroundColor: 'rgba(255,248,220, 0.95)',
                    padding: { x: 20, y: 10 },
                    fontFamily: 'Georgia, serif',
                    stroke: '#8B4513',
                    strokeThickness: 2
                });
                notification.setOrigin(0.5);
                
                this.tweens.add({
                    targets: notification,
                    alpha: 0,
                    duration: 2000,
                    delay: 2000,
                    onComplete: () => notification.destroy()
                });
            }

            showWelcomeMessage() {
                const welcome = this.add.text(512, 400, '欢迎来到 402 虚拟生活社区系统！\n\n🎨 八方旅人风格已启用\n\n✨ 6 位伙伴已就位\n\n试试点击角色进行互动', {
                    fontSize: '22px',
                    fill: '#5D4037',
                    backgroundColor: 'rgba(255,248,220, 0.9)',
                    padding: { x: 30, y: 25 },
                    align: 'center',
                    lineSpacing: 10,
                    fontFamily: 'Georgia, serif',
                    stroke: '#8B4513',
                    strokeThickness: 3
                });
                welcome.setOrigin(0.5);
                
                this.tweens.add({
                    targets: welcome,
                    alpha: 0,
                    duration: 1000,
                    delay: 6000,
                    onComplete: () => welcome.destroy()
                });
            }

            showError(message) {
                const error = this.add.text(512, 384, `❌ ${message}`, {
                    fontSize: '24px',
                    fill: '#C62828',
                    backgroundColor: 'rgba(255,248,220, 0.95)',
                    padding: { x: 20, y: 10 },
                    fontFamily: 'Georgia, serif',
                    stroke: '#8B4513',
                    strokeThickness: 2
                });
                error.setOrigin(0.5);
                this.time.delayedCall(3000, () => error.destroy());
            }
        }

        // 配置
        const config = {
            type: Phaser.AUTO,
            width: 1024,
            height: 768,
            parent: 'game-container',
            backgroundColor: '#FFF8DC',
            pixelArt: false,  // HD-2D 风格
            roundPixels: false,
            antialias: true,
            antialiasGL: true,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [Boot, Home],
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1024,
                height: 768
            },
            renderer: Phaser.WEBGL
        };

        // 启动游戏
        window.addEventListener('load', () => {
            try {
                const game = new Phaser.Game(config);
                console.log('✅ 八方旅人风格游戏启动成功');
            } catch (error) {
                console.error('❌ 游戏启动失败:', error);
                document.getElementById('game-container').innerHTML = `
                    <div style="color: #FFF8DC; text-align: center; padding: 50px; font-family: Georgia, serif;">
                        <h2>❌ 游戏启动失败</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>

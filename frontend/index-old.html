<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>402 虚拟生活社区系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- 使用 UMD 版本的 Phaser（更稳定） -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    
    <script>
        // Boot 场景
        class Boot extends Phaser.Scene {
            constructor() {
                super({ key: 'Boot' });
            }

            preload() {
                console.log('🔄 开始加载资源...');

                // 创建加载进度条
                const progressBar = this.add.graphics();
                const width = this.cameras.main.width;
                const height = this.cameras.main.height;
                
                const progressBarBg = this.add.graphics();
                progressBarBg.fillStyle(0x333333, 1);
                progressBarBg.fillRect(width / 4, height / 2 - 15, width / 2, 30);
                
                this.load.on('progress', (value) => {
                    progressBar.clear();
                    progressBar.fillStyle(0x4CAF50, 1);
                    progressBar.fillRect(width / 4, height / 2 - 15, (width / 2) * value, 30);
                });
                
                this.load.on('complete', () => {
                    progressBar.destroy();
                    progressBarBg.destroy();
                    console.log('✅ 资源加载完成');
                });

                // 加载真实的角色 PNG 文件
                const members = ['chu', 'bo', 'hao', 'qian', 'dong', 'zhu'];
                const charFiles = {
                    'chu': 'assets/skins/characters/初.png',
                    'bo': 'assets/skins/characters/博.png',
                    'hao': 'assets/skins/characters/昊.png',
                    'qian': 'assets/skins/characters/千.png',
                    'dong': 'assets/skins/characters/东.png',
                    'zhu': 'assets/skins/characters/竹.png'
                };
                
                members.forEach((member, index) => {
                    this.load.image(member, charFiles[member]);
                    console.log(`✅ 加载角色: ${member} -> ${charFiles[member]}`);
                    
                    // 注册为精灵图（单帧，64x64）
                    this.load.spritesheet(member, charFiles[member], {
                        frameWidth: 64,
                        frameHeight: 64
                    });
                });
            }

            create() {
                console.log('🎮 创建动画...');
                this.createCharacterAnimations();
                console.log('✅ Phaser 3 初始化完成');
                this.time.delayedCall(1000, () => {
                    console.log('🏠 启动主场景...');
                    this.scene.start('Home');
                });
            }

            createCharacterAnimations() {
                const members = ['chu', 'bo', 'hao', 'qian', 'dong', 'zhu'];
                
                members.forEach(member => {
                    this.anims.create({
                        key: `${member}_idle`,
                        frames: [{ key: member, frame: 0 }],
                        frameRate: 1,
                        repeat: -1
                    });

                    this.anims.create({
                        key: `${member}_walk`,
                        frames: [{ key: member, frame: 0 }],
                        frameRate: 8,
                        repeat: -1
                    });

                    this.anims.create({
                        key: `${member}_work`,
                        frames: [{ key: member, frame: 0 }],
                        frameRate: 8,
                        repeat: -1
                    });

                    this.anims.create({
                        key: `${member}_drunk`,
                        frames: [{ key: member, frame: 0 }],
                        frameRate: 2,
                        repeat: -1
                    });
                });
                
                console.log('✅ 角色动画创建完成');
            }
        }

        // Character 类
        class Character extends Phaser.Physics.Arcade.Sprite {
            constructor(scene, x, y, memberData) {
                super(scene, x, y, memberData.id);
                
                this.memberData = memberData;
                this.characterId = memberData.id;
                this.characterName = memberData.name;
                this.currentState = 'idle';
                
                scene.physics.add.existing(this);
                this.setCollideWorldBounds(true);
                this.setInteractive();
                
                this.on('pointerdown', this.handleClick, this);
                this.on('pointerover', this.handleHover, this);
                this.on('pointerout', this.handleHoverOut, this);
                
                scene.add.existing(this);
                this.play(`${this.characterId}_idle`);
                this.createNameLabel();
            }

            createNameLabel() {
                this.nameLabel = this.scene.add.text(this.x, this.y - 30, this.characterName, {
                    fontSize: '14px',
                    fill: '#fff',
                    backgroundColor: 'rgba(0,0,0,0.5)',
                    padding: { x: 5, y: 2 }
                });
                this.nameLabel.setOrigin(0.5);
            }

            handleClick() {
                console.log(`👆 点击角色: ${this.characterName}`);
                this.showInteractionMenu();
            }

            handleHover() {
                this.scene.tweens.add({
                    targets: this,
                    scaleX: 1.1,
                    scaleY: 1.1,
                    duration: 100
                });
            }

            handleHoverOut() {
                this.scene.tweens.add({
                    targets: this,
                    scaleX: 1,
                    scaleY: 1,
                    duration: 100
                });
            }

            showInteractionMenu() {
                const scene = this.scene;
                
                // 关闭之前的菜单
                if (this.currentMenu) {
                    this.currentMenu.destroy();
                }
                
                const menu = scene.add.container(this.x, this.y - 100);
                this.currentMenu = menu;
                
                // 背景
                const bg = scene.add.rectangle(0, 0, 200, 200, 0xffffff);
                bg.setStrokeStyle(2, 0x000000);
                menu.add(bg);
                
                // 标题
                const title = scene.add.text(0, -80, this.characterName, {
                    fontSize: '18px',
                    fill: '#000',
                    fontStyle: 'bold'
                });
                title.setOrigin(0.5);
                menu.add(title);
                
                // 按钮分组
                const buttons = [
                    // 主要按钮
                    { 
                        text: '🎯 动作', 
                        action: () => this.showActionMenu(),
                        color: '#4CAF50',
                        y: -40
                    },
                    { 
                        text: 'ℹ️ 信息', 
                        action: () => this.showInfo(),
                        color: '#2196F3',
                        y: 0
                    },
                    { 
                        text: '❌ 关闭', 
                        action: () => menu.destroy(),
                        color: '#f44336',
                        y: 60
                    }
                ];
                
                buttons.forEach(btn => {
                    const button = scene.add.text(0, btn.y, btn.text, {
                        fontSize: '16px',
                        fill: '#fff',
                        backgroundColor: btn.color,
                        padding: { x: 12, y: 8 }
                    });
                    button.setOrigin(0.5);
                    button.setInteractive();
                    button.on('pointerdown', btn.action);
                    button.on('pointerover', () => {
                        scene.tweens.add({
                            targets: button,
                            scaleX: 1.05,
                            scaleY: 1.05,
                            duration: 100
                        });
                    });
                    button.on('pointerout', () => {
                        button.setScale(1);
                    });
                    menu.add(button);
                });
                
                // 点击外部关闭
                const closeHandler = () => {
                    menu.destroy();
                    this.currentMenu = null;
                    scene.input.off('pointerdown', closeHandler);
                };
                
                scene.time.delayedCall(8000, closeHandler);
            }

            showActionMenu() {
                const scene = this.scene;
                
                // 关闭主菜单
                if (this.currentMenu) {
                    this.currentMenu.destroy();
                }
                
                const actionMenu = scene.add.container(this.x, this.y - 80);
                this.currentMenu = actionMenu;
                
                // 背景
                const bg = scene.add.rectangle(0, 0, 220, 250, 0xffffff);
                bg.setStrokeStyle(2, 0x000000);
                actionMenu.add(bg);
                
                // 标题
                const title = scene.add.text(0, -100, '选择动作', {
                    fontSize: '18px',
                    fill: '#000',
                    fontStyle: 'bold'
                });
                title.setOrigin(0.5);
                actionMenu.add(title);
                
                // 动作按钮
                const actions = [
                    { 
                        text: '🍹 调酒', 
                        emoji: '🍹',
                        action: () => this.makeDrink(),
                        color: '#FF9800'
                    },
                    { 
                        text: '🍺 灌醉', 
                        emoji: '🍺',
                        action: () => this.getDrunk(),
                        color: '#F44336'
                    },
                    { 
                        text: '😴 休息', 
                        emoji: '😴',
                        action: () => this.rest(),
                        color: '#9C27B0'
                    },
                    { 
                        text: '🎨 换装', 
                        emoji: '🎨',
                        action: () => this.changeSkin(),
                        color: '#00BCD4'
                    },
                    { 
                        text: '🎵 唱歌', 
                        emoji: '🎵',
                        action: () => this.sing(),
                        color: '#FFEB3B'
                    },
                    { 
                        text: '💃 跳舞', 
                        emoji: '💃',
                        action: () => this.dance(),
                        color: '#E91E63'
                    },
                    { 
                        text: '📝 备忘', 
                        emoji: '📝',
                        action: () => this.setMemo(),
                        color: '#607D8B'
                    },
                    { 
                        text: '❌ 返回', 
                        emoji: '❌',
                        action: () => {
                            actionMenu.destroy();
                            this.showInteractionMenu();
                        },
                        color: '#9E9E9E'
                    }
                ];
                
                actions.forEach((action, index) => {
                    const x = -80 + (index % 2) * 90;
                    const y = -60 + Math.floor(index / 2) * 45;
                    
                    const button = scene.add.rectangle(x, y, 80, 35, action.color);
                    button.setStrokeStyle(1, 0x000000);
                    button.setInteractive();
                    actionMenu.add(button);
                    
                    const buttonText = scene.add.text(x, y, `${action.emoji}\n${action.text}`, {
                        fontSize: '11px',
                        fill: '#fff',
                        align: 'center',
                        lineSpacing: 2
                    });
                    buttonText.setOrigin(0.5);
                    actionMenu.add(buttonText);
                    
                    button.on('pointerdown', action.action);
                    button.on('pointerover', () => {
                        scene.tweens.add({
                            targets: button,
                            scaleX: 1.05,
                            scaleY: 1.05,
                            duration: 100
                        });
                    });
                    button.on('pointerout', () => {
                        button.setScale(1);
                    });
                });
                
                // 点击外部关闭
                scene.time.delayedCall(10000, () => {
                    actionMenu.destroy();
                    this.currentMenu = null;
                });
            }

            makeDrink() {
                console.log(`🍹 ${this.characterName} 正在调酒`);
                this.play(`${this.characterId}_work`);
                this.showEffect('🍹 调酒中...');
                this.scene.time.delayedCall(3000, () => {
                    this.play(`${this.characterId}_idle`);
                    this.showEffect('✅ 调酒完成！');
                });
            }

            getDrunk() {
                console.log(`🥴 ${this.characterName} 被灌醉了`);
                this.play(`${this.characterId}_drunk`);
                this.showEffect('🥴 醉酒了！');
                this.currentState = 'drunk';
                this.scene.time.delayedCall(10000, () => {
                    this.play(`${this.characterId}_idle`);
                    this.currentState = 'idle';
                    this.showEffect('😊 恢复清醒');
                });
            }

            rest() {
                console.log(`😴 ${this.characterName} 正在休息`);
                this.showEffect('😴 休息中...');
                this.scene.time.delayedCall(5000, () => {
                    this.showEffect('⚡ 恢复活力！');
                });
            }

            changeSkin() {
                console.log(`🎨 ${this.characterName} 更换皮肤`);
                this.showEffect('🎨 皮肤功能开发中...');
            }

            sing() {
                console.log(`🎵 ${this.characterName} 正在唱歌`);
                this.showEffect('🎵 ~啦啦啦~');
                this.scene.tweens.add({
                    targets: this,
                    scale: 1.8,
                    duration: 200,
                    yoyo: true,
                    repeat: 2
                });
            }

            dance() {
                console.log(`💃 ${this.characterName} 正在跳舞`);
                this.showEffect('💃 跳舞中...');
                this.scene.tweens.add({
                    targets: this,
                    angle: 360,
                    duration: 1000,
                    repeat: 2
                });
            }

            setMemo() {
                console.log(`📝 ${this.characterName} 设置备忘`);
                this.showEffect('📝 备忘功能开发中...');
            }

            showInfo() {
                const scene = this.scene;
                const infoText = `👤 名称: ${this.characterName}\n🎭 ID: ${this.characterId}\n❤️ 状态: ${this.currentState}`;
                
                const info = scene.add.text(this.x, this.y - 150, infoText, {
                    fontSize: '12px',
                    fill: '#000',
                    backgroundColor: '#fff',
                    padding: { x: 10, y: 10 },
                    lineSpacing: 5
                });
                info.setOrigin(0.5);
                scene.time.delayedCall(4000, () => info.destroy());
            }

            showEffect(text) {
                const scene = this.scene;
                const effectText = scene.add.text(this.x, this.y - 50, text, {
                    fontSize: '14px',
                    fill: '#fff',
                    backgroundColor: '#000',
                    padding: { x: 8, y: 4 }
                });
                effectText.setOrigin(0.5);
                
                scene.tweens.add({
                    targets: effectText,
                    y: this.y - 80,
                    alpha: 0,
                    duration: 2000,
                    onComplete: () => effectText.destroy()
                });
            }
        }

        // Home 场景
        class Home extends Phaser.Scene {
            constructor() {
                super({ key: 'Home' });
            }

            create() {
                console.log('🏠 主场景加载');
                
                this.add.rectangle(400, 300, 800, 600, 0x2c3e50);
                
                this.add.text(400, 30, '402 虚拟生活社区系统', {
                    fontSize: '32px',
                    fill: '#fff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                
                this.characters = this.physics.add.group();
                this.loadCharacters();
                this.createUI();
                this.showWelcomeMessage();
                
                console.log('✅ 主场景初始化完成');
            }

            async loadCharacters() {
                try {
                    const response = await fetch('/api/members');
                    const members = await response.json();
                    
                    console.log('📋 加载成员:', members);
                    
                members.forEach((member, index) => {
                    const x = 200 + (index % 3) * 250;
                    const y = 250 + Math.floor(index / 3) * 300;
                    
                    const char = new Character(this, x, y, member);
                    // HD-2D 风格：放大显示（从 64x64 缩放到 128x128）
                    char.setScale(2.0);
                    this.characters.add(char);
                });
                    
                    console.log(`✅ 创建了 ${members.length} 个角色`);
                } catch (error) {
                    console.error('❌ 加载成员失败:', error);
                    this.showError('无法加载成员数据');
                }
            }

            createUI() {
                const musicBtn = this.add.text(700, 50, '🎵 音乐', {
                    fontSize: '16px',
                    backgroundColor: '#4CAF50',
                    padding: { x: 10, y: 5 },
                    color: '#fff'
                });
                musicBtn.setInteractive();
                musicBtn.on('pointerdown', () => this.showNotification('音乐播放器（开发中）'));
                
                const chatBtn = this.add.text(700, 100, '💬 聊天', {
                    fontSize: '16px',
                    backgroundColor: '#2196F3',
                    padding: { x: 10, y: 5 },
                    color: '#fff'
                });
                chatBtn.setInteractive();
                chatBtn.on('pointerdown', () => this.showNotification('聊天室（开发中）'));
                
                const treeHoleBtn = this.add.text(700, 150, '🌳 树洞', {
                    fontSize: '16px',
                    backgroundColor: '#FF9800',
                    padding: { x: 10, y: 5 },
                    color: '#fff'
                });
                treeHoleBtn.setInteractive();
                treeHoleBtn.on('pointerdown', () => this.showNotification('树洞（开发中）'));
                
                console.log('✅ UI 创建完成');
            }

            showNotification(message) {
                const notification = this.add.text(400, 550, message, {
                    fontSize: '16px',
                    backgroundColor: '#000',
                    color: '#fff',
                    padding: { x: 20, y: 10 }
                });
                notification.setOrigin(0.5);
                
                this.tweens.add({
                    targets: notification,
                    alpha: 0,
                    y: 500,
                    duration: 2000,
                    delay: 2000,
                    onComplete: () => notification.destroy()
                });
            }

            showWelcomeMessage() {
                const welcome = this.add.text(400, 300, '欢迎来到 402 虚拟生活社区系统！\n\nPhaser 3 引擎已启动\n像素风角色系统就绪\n\n试试点击角色进行互动', {
                    fontSize: '18px',
                    fill: '#fff',
                    backgroundColor: 'rgba(0,0,0,0.7)',
                    padding: { x: 30, y: 20 },
                    align: 'center',
                    lineSpacing: 8
                });
                welcome.setOrigin(0.5);
                
                this.tweens.add({
                    targets: welcome,
                    alpha: 0,
                    duration: 1000,
                    delay: 5000,
                    onComplete: () => welcome.destroy()
                });
            }

            showError(message) {
                const error = this.add.text(400, 300, `❌ ${message}`, {
                    fontSize: '20px',
                    fill: '#ff0000',
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    padding: { x: 20, y: 10 }
                });
                error.setOrigin(0.5);
                this.time.delayedCall(3000, () => error.destroy());
            }
        }

        // Phaser 配置
        const config = {
            type: Phaser.AUTO,
            width: 1024,  // 扩大画布
            height: 768,
            parent: 'game-container',
            backgroundColor: '#FFF8DC',  // 八方旅人米黄色背景
            pixelArt: false,  // 关闭像素风！使用 HD-2D
            roundPixels: false,  // 关闭像素圆角
            antialias: true,  // 开启抗锯齿
            antialiasGL: true,  // WebGL 抗锯齿
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [Boot, Home],
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            renderer: Phaser.WEBGL  // 使用 WebGL 渲染器
        };

        // 启动游戏
        window.addEventListener('load', () => {
            try {
                const game = new Phaser.Game(config);
                console.log('✅ Phaser 游戏启动成功');
            } catch (error) {
                console.error('❌ Phaser 启动失败:', error);
                document.getElementById('game-container').innerHTML = `
                    <div style="color: white; text-align: center; padding: 50px;">
                        <h2>❌ 游戏启动失败</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
